# Profile: run-level knobs (output dir, concurrency, artifact mirroring).
# Referenced from a main experiment yaml as:
#     run_profile: configs/runs/default.yaml
#
# Any of these can also be inlined at the top level of the main yaml; inline
# values override the profile.

output:
  root: .logs                           # created if missing; .logs/ is gitignored

# Max units running simultaneously. Each unit holds a slot for its full
# lifetime (VM acquire + agent run + eval), so this caps both VM count
# AND concurrent LLM API calls. Size to min(GCP quota, LLM RPM budget).
# 1 = sequential (safe debug default).
concurrency: 1

# Artifact paths — controls how task data reaches the VM and where the
# agent's output goes after the run.
artifacts_path:
  # GCS prefix the lifecycle reads task data from (input/, software/,
  # reference/). Defaults to the public mirror; override if you host your
  # own task-data bucket.
  task_data_path: gs://ale-data-public

  # What to do with the env's output dir after the agent finishes:
  #   null              — skip; output stays on the VM and is lost on teardown.
  #   "local"           — pull files to <run_dir>/output/ via cua HTTP
  #                       (no GCS round-trip). Right for dev / smoke / small
  #                       outputs; expect O(per-file) HTTP RPC.
  #   "gs://<bucket>"   — VM-side gsutil push to that bucket; nothing lands
  #                       on the host run dir. Right for large-scale batches
  #                       where outputs get processed out-of-band. Hard fail
  #                       on GCS error (no cua fallback in v1).
  output_path: gs://ale-run-results
