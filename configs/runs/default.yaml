# Profile: run-level knobs (output dir, concurrency, artifact mirroring).
# Referenced from a main experiment yaml as:
#     run_profile: configs/runs/default.yaml
#
# Any of these can also be inlined at the top level of the main yaml; inline
# values override the profile.

output:
  root: .logs                           # created if missing; .logs/ is gitignored

# Max units running simultaneously. Each unit holds a slot for its full
# lifetime (VM acquire + agent run + eval), so this caps both VM count
# AND concurrent LLM API calls. Size to min(GCP quota, LLM RPM budget).
# 1 = sequential (safe debug default).
concurrency: 1

# Artifact paths — controls where task data is sourced from and where
# the agent's output goes after the run.
artifacts_path:
  # Where to source task data (input/, software/, reference.7z) from:
  #   "baked_in_sandbox"  — image already has task data baked in at
  #                         <sandbox.task_data_root>/<domain>/<task>/<variant>/.
  #                         Reference is shipped as encrypted reference.7z
  #                         (decrypted just-in-time at evaluation).
  #   "gs://<bucket>"     — gsutil rsync from that GCS bucket. Skips
  #                         input/software pull if image already has them
  #                         (image-baked detection). Always re-pulls
  #                         reference/ fresh.
  #                         Open-to-all bucket: gs://ale-data-public
  #                         (readable by the agenthle-vm-service@agenthle-488519
  #                         SA baked into our images; external runs can grant
  #                         their own SA `roles/storage.objectViewer` on it).
  #   "hf://<dataset>"    — HuggingFace Hub (stub, not yet implemented).
  task_data_source: gs://ale-data-public

  # What to do with the agent's output dir after the run:
  #   null              — skip; output stays on the sandbox and is lost on teardown.
  #   "local"           — pull files to <run_dir>/output/ via cua HTTP
  #                       (no GCS round-trip). Right for dev / smoke / small outputs.
  #   "gs://<bucket>"   — sandbox-side gsutil push to that bucket; nothing
  #                       lands on host run dir. Hard-fail on GCS error.
  output_path: local
