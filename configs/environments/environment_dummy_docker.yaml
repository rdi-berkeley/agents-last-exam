# ============================================================================
# environment_dummy_docker.yaml — copy of environment.yaml for the dummy smoke
# run, with cpu-free-ubuntu routed to a LOCAL DOCKER container
# (ale-ubuntu22-docker) instead of a GCE VM. All Windows / GPU snapshots keep
# the gcloud mapping unchanged.
#
# The top-level gcs_sa_key is copied into each container so in-VM gsutil can
# pull task data (gs://ale-data-public) AND output_test_pos (gs://ale-data-all)
# — the artifact-writer SA was granted objectViewer on ale-data-all for this.
# ============================================================================

snapshots:

  cpu-free-ubuntu:            # Linux, no GPU, no license — the bulk of tasks (~110)
    provider: docker
    image: ale-ubuntu22-docker   # container ref + port (5000) come from the Image entry
    docker:                      # docker-only knobs: container sizing
      cpus: 4
      memory: 16g
      shm_size: 1g

  cpu-free:                   # Windows, no GPU, no license
    provider: gcloud
    image: ale-win10
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: agenthle-vpc
      subnet: agenthle-vpc
      zones: [us-central1-a, us-central1-b, us-east1-b]

  cpu-license:                # Windows requiring a licensed image
    provider: gcloud
    image: ale-win10
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: agenthle-vpc
      subnet: agenthle-vpc
      zones: [us-east1-b, us-central1-a]

  gpu-free:                   # Windows + GPU
    provider: gcloud
    image: ale-win10
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: agenthle-vpc
      subnet: agenthle-vpc
      gpu: nvidia-l4-vws
      zones: [us-central1-a, us-central1-b]

  gpu-license:                # Windows + GPU, licensed
    provider: gcloud
    image: ale-win10
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: agenthle-vpc
      subnet: agenthle-vpc
      gpu: nvidia-l4-vws
      zones: [us-central1-a, us-central1-b]

# ---------------------------------------------------------------------------
# Task data + output (substrate-coupled: code lives under ale_run/environments/).
# ---------------------------------------------------------------------------
# Where to source task data: "baked_in_sandbox" | "gs://<bucket>" | "hf://<ds>".
task_data_source: gs://ale-data-public
# A gs:// source carries a GCS SA key (host path). The docker provider copies it
# into each container so gsutil can stage + bill requester-pays buckets; gcloud
# images already have a baked SA and ignore it.
gcs_sa_key: secret/gcp_key.json

# Output dir after the run: null (skip) | "local" | "gs://<bucket>".
output_path: local
