# Profile: gcloud-backed ephemeral VMs.
# Referenced from a main experiment yaml as:
#     environment:
#       provider: gcloud
#       profile: configs/environments/gcloud_default.yaml
#
# Only deployment-specific knobs live here. The snapshot→image mapping,
# machine-type fallback (c* → n2), and boot-disk-type selection are
# framework facts hardcoded in the gcloud provider.
#
#   project / service_account_key   GCP creds (from .env via ${env:...})
#   instance_prefix                 VM-name prefix
#   network / subnet                VPC the VMs attach to. MUST expose port
#                                   5000 (cua-server).
#   snapshots:                      logical snapshot tag (task_card
#                                   vm.snapshot) → image + optional gpu + zones.
#     <tag>:
#       image:  GCE image name (= framework Image-registry family name)
#       gpu:    optional accelerator type (e.g. nvidia-l4-vws)
#       zones:  zones to try in order on capacity errors. GPU snapshots
#               list only GPU-capable zones.
#
# NOT here (hardcoded in the provider): machine-type selection — task_card
# vm.machineType wins, else a default, with C→N2 fallback; boot disk type
# is derived from the machine family.

project: ${env:GCP_PROJECT}
service_account_key: ${env:GCP_SA_KEY}
instance_prefix: ale

network: agenthle-vpc
subnet: agenthle-vpc

snapshots:
  cpu-free-ubuntu:
    image: ale-ubuntu22
    zones: [us-central1-a, us-east1-b, us-west1-a]

  cpu-free:
    image: ale-win10
    zones: [us-central1-a, us-central1-b, us-east1-b]

  cpu-license:
    image: ale-win10
    zones: [us-east1-b, us-central1-a]

  gpu-free:
    image: ale-win10
    gpu: nvidia-l4-vws
    zones: [us-central1-a, us-central1-b]

  gpu-license:
    image: ale-win10
    gpu: nvidia-l4-vws
    zones: [us-central1-a, us-central1-b]
