# ============================================================================
# environment.yaml — the one environment config.
# ============================================================================
# A task card declares a logical `snapshot` (its `image_category`, e.g.
# "cpu-free-ubuntu"). For EVERY snapshot a task can ask for, this file says:
#
#   • provider — which backend instantiates the box (gcloud VM / docker / static)
#   • image    — which sandbox image to boot (the image NAME; its container ref,
#                cua-server port and sandbox paths all come from the Image entry
#                under ale_run/environments/images/)
#   • <provider>: { ... } — knobs for THAT provider only
#
# provider is chosen PER SNAPSHOT, so ONE environment can mix backends (cheap
# Linux tasks in Docker, Windows/GPU on GCloud VMs). Each snapshot block is
# self-contained: there is no shared top-level `providers:` section — gcloud
# connection fields are repeated on each gcloud snapshot (repetition is fine).
#
# ---------------------------------------------------------------------------
# resolution (per Windows snapshot, optional) — forces the Windows desktop
# framebuffer to a fixed size so GUI tasks render deterministically. Form:
# `resolution: [w, h]` or `resolution: "WxH"`. Linux snapshots ignore it (X
# picks its own size). Set it INSIDE the snapshot block as a sibling of
# `image:` (NOT inside the `gcloud:` block). The gcloud provider applies it at
# acquire() time; if the mode is not supported by that VM's display adapter the
# RUN FAILS (no silent fallback) and the error lists the supported modes.
#
# Resolutions GCE Windows supports (verified by EnumDisplaySettings on live
# VMs — pick one of these or the run fails):
#   • non-GPU VMs (basic display adapter) — up to 1920x1440, 25 modes:
#       640x480 800x480 800x600 832x624 960x640 1024x600 1024x768 1152x864
#       1152x870 1280x720 1280x760 1280x768 1280x800 1280x960 1280x1024
#       1360x768 1366x768 1400x1050 1440x900 1600x900 1600x1200 1680x1050
#       1920x1080 1920x1200 1920x1440
#   • GPU VMs (nvidia-l4-vws / NVIDIA GRID) — a SUPERSET, up to 8K:
#       all of the above plus 2048x1536 2560x1440 2560x1600 3840x2160
#       3840x2400 4096x2160 5120x2880 7680x4320
# 1024x768 and 1920x1080 work on both. A freshly-booted VM exposes the full
# list; a long-idle VM can degrade to 640x480-only, so build/test on fresh VMs.
# (Windows GetSystemMetrics may misreport the live size — trust the actual
# screenshot / cua get_screen_size, which always match the real framebuffer.)
# ---------------------------------------------------------------------------

snapshots:

  cpu-free-ubuntu:            # Linux, no GPU, no license — the bulk of tasks (~110)
    provider: gcloud
    image: ale-ubuntu22
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: ale-vpc
      subnet: ale-vpc
      zones: [us-central1-a, us-east1-b, us-west1-a]
    # TODO: ALTERNATIVE — run Ubuntu tasks in a local Docker container instead:
    #   provider: docker
    #   image: ale-ubuntu22-docker          # container ref + port (8000) come from the Image entry
    #   docker:                   # docker-only knobs: container sizing
    #     cpus: 4
    #     memory: 16g
    #     shm_size: 1g

  cpu-free:                   # Windows, no GPU, no license
    provider: gcloud
    image: ale-win10
    resolution: [1024, 768]    # see resolution note above; unsupported mode -> run fails
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: ale-vpc
      subnet: ale-vpc
      zones: [us-central1-a, us-central1-b, us-east1-b]

  cpu-license:                # Windows requiring a licensed image
    provider: gcloud
    image: ale-win10
    resolution: [1024, 768]    # see resolution note above; unsupported mode -> run fails
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: ale-vpc
      subnet: ale-vpc
      zones: [us-east1-b, us-central1-a]

  gpu-free:                   # Windows + GPU
    provider: gcloud
    image: ale-win10
    resolution: [1920, 1080]    # see resolution note above; unsupported mode -> run fails
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: ale-vpc
      subnet: ale-vpc
      gpu: nvidia-l4-vws
      # GPU (nvidia-l4-vws) fallback zones, US-first. L4 capacity is volatile
      # and often exhausted in a single region; gcloud tries these in order and
      # skips capacity-exhausted zones, so list several across regions.
      zones: [us-east1-c, us-central1-a, us-central1-b, us-east1-b, us-east4-a, northamerica-northeast2-a, northamerica-northeast1-c, europe-west1-b, europe-west2-b, asia-east1-a]

  gpu-license:                # Windows + GPU, licensed
    provider: gcloud
    image: ale-win10
    resolution: [1920, 1080]    # see resolution note above; unsupported mode -> run fails
    gcloud:
      project: ${env:GCP_PROJECT}
      service_account_key: ${env:GCP_SA_KEY}
      instance_prefix: ale
      network: ale-vpc
      subnet: ale-vpc
      gpu: nvidia-l4-vws
      # GPU (nvidia-l4-vws) fallback zones, US-first. L4 capacity is volatile
      # and often exhausted in a single region; gcloud tries these in order and
      # skips capacity-exhausted zones, so list several across regions.
      zones: [us-east1-c, us-central1-a, us-central1-b, us-east1-b, us-east4-a, northamerica-northeast2-a, northamerica-northeast1-c, europe-west1-b, europe-west2-b, asia-east1-a]

# ---------------------------------------------------------------------------
# Task data + output (substrate-coupled: code lives under ale_run/environments/).
# ---------------------------------------------------------------------------
# Where to source task data: "baked_in_sandbox" | "gs://ale-data-public" | "hf://<ds> TODO: add hf support".
task_data_source: baked_in_sandbox
# A gs:// source carries a GCS SA key (host path). The docker provider copies it
# into each container so gsutil can stage + bill requester-pays buckets; gcloud
# images already have a baked SA and ignore it.
gcs_sa_key: secret/gcp_key.json

# Output dir after the run: null (skip) | "local" | "gs://<bucket>".
output_path: local
