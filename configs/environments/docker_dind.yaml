# Docker provider, DinD-capable image, baked task data. For tasks whose eval
# runs nested Docker (openroad, minikube/k8s, compose).
snapshots:
  cpu-free-ubuntu:
    provider: docker
    image: ale-ubuntu22-docker
    docker:
      cpus: 8
      memory: 32g
      shm_size: 2g
      privileged: true
      image_ref: ale-ubuntu22-docker:dind
task_data_source: baked_in_sandbox
output_path: local
gcs_sa_key: secret/gcp_key.json
