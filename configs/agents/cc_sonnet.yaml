# Profile: claude-code CLI, Sonnet preset.
# Referenced from a main experiment yaml as:
#     agent:
#       harness: claude_code
#       model: anthropic/claude-sonnet-4-6
#       profile: configs/agents/cc_sonnet.yaml
#
# Fields below are merged into the experiment's agent block; main-yaml values
# win on conflict (so `model` always lives in the main yaml).

# runtime: vm                           # implicit — claude_code only supports vm
config:
  max_turns: 20
  timeout_s: 900
  dangerously_skip_permissions: true    # default for benchmark eval
  # max_budget_usd: 5.0                 # optional spending cap
  # disabled_tools: ["WebSearch"]       # claude CLI disallowedTools flag
  # base_url: null                      # explicit ANTHROPIC_BASE_URL override
