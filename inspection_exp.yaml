# =============================================================================
# inspection_exp.yaml — environment-inspection / agent-feedback experiment.
#
# Runs claude_code (sonnet 4.6) over every selected task, but instead of SOLVING
# each task the agent AUDITS it on three axes and writes a JSON report to the
# task's output dir. Two purposes:
#   (1) verify the gcloud environment + images work end-to-end;
#   (2) collect structured agent feedback on every task.
#
#   uv run python -m ale_run run inspection_exp.yaml --dry-run
#   uv run python -m ale_run run inspection_exp.yaml \
#       --task computing_math/cost_optimization_1 --concurrency 1
#   uv run python -m ale_run run inspection_exp.yaml
#
# Wiring only: agent config lives in configs/agents/, environment (incl.
# task_data_source / output_path) in configs/environments/. This run inherits
# the standard gcloud env (task_data_source: gs://ale-data-public).
# =============================================================================

name: env_inspection_v1

secret_file: secret/.env

agents:
  - configs/agents/cc_sonnet_or_base.yaml
environment: configs/environments/environment.yaml

tasks: selected_tasks/_inspection_all.txt        # cli + full union

output:
  root: .logs/ale
concurrency: 20                                  # up to 20 VMs alive at once
cleanup_mode: delete                             # delete each VM after its unit

# ---------------------------------------------------------------------------
# Inspection instruction — appended verbatim to EVERY task's prompt (after the
# task description + the framework's Input/Output contract). It overrides the
# "solve the task" intent and tells the agent to audit + emit one JSON report.
#
# It cannot hardcode a per-task output path (one suffix, many tasks), so it
# refers to "the OUTPUT directory named in the task above" — every task prompt
# already states its concrete input/output paths.
# ---------------------------------------------------------------------------
prompt_suffix: |

  ============================================================
  ⚠️ MODE OVERRIDE — READ THIS FIRST. IT REPLACES THE TASK ABOVE.
  ============================================================
  This is a READ-ONLY AUDIT. Ignore the instruction above to perform the task.
  You are NOT scored on the task. Your ONLY job is to inspect this task's setup
  and environment, then write a single JSON report.

  STRICT RULES — follow exactly:
    - DO NOT run the task's computation: no solver, training, simulation,
      analysis, build, conversion, or data-processing run of any kind.
    - DO NOT produce the task's deliverables or any "answer".
    - DO NOT create, move, or write ANY file ANYWHERE except the single
      inspection_report.json described below. If running something would emit
      files, do not run it.
  ALLOWED, and only this: listing/reading files (e.g. ls, cat, head), checking
  that a tool exists and launches (`<tool> --version`, or opening an app and
  confirming its window/UI loads), and reasoning about the task text. Keep it to
  a handful of quick read-only checks, then write the report and STOP.

  Score these THREE dimensions. Each gets an integer rating 0-5 plus a short
  English description (2-4 sentences citing concrete evidence — file names,
  versions, exact error text):

  1. task_clarity — Could a competent agent act on the task description WITHOUT
     guessing? Judge each of these and mention any that fail:
       - GOAL: is what to produce clearly stated (not vague)?
       - INPUT PATH: is the input location given explicitly, and does it match
         what is actually on disk?
       - OUTPUT PATH: is the exact output directory/location to write results
         specified?
       - OUTPUT NAME+FORMAT: are the output file name(s), format, and
         schema/columns/keys specified well enough to produce a gradeable
         result without guessing?
       - SUCCESS CRITERIA: are constraints, units, tolerances, or grading
         expectations clear?
     Rating guide: 5 = fully specified, zero guessing needed. 3 = the goal is
     clear but at least one of input path / output path / output format is
     vague or must be inferred. 0 = cannot tell what to do, or the input/output
     paths are missing, wrong, or contradict what is on disk.

  2. software_usability — Can EVERY tool/application the task needs be opened
     and used in THIS environment? Actually try: launch GUI apps; run CLI tools
     (`--version` or a trivial invocation). 5 = all required software opens and
     works. 0 = required software is missing, won't launch, crashes, or is
     unlicensed/unusable. If the task needs no special software, give 5 and say
     so explicitly.

  3. input_data_completeness — Is the input data complete and usable? Verify
     every file the task references exists in the input folder, is non-empty,
     readable, and in the expected format. 5 = all inputs present and valid.
     0 = inputs missing, empty, corrupt, or unreadable. Name any offending file.

  Then WRITE your report as a file named exactly `inspection_report.json` in the
  OUTPUT directory named in the task's "Input / Output" section above (create
  the directory if it does not exist). Write ONLY that one file. Use EXACTLY
  this JSON schema:

  {
    "task_clarity":            {"rating": <0-5>, "description": "..."},
    "software_usability":      {"rating": <0-5>, "description": "..."},
    "input_data_completeness": {"rating": <0-5>, "description": "..."},
    "blocking_issues": ["<short issue>", "..."],
    "inspected_paths": {"input_dir": "<path you saw>", "output_dir": "<path you wrote to>"}
  }

  overall_runnable = could a competent agent actually complete this task in this
  environment as-is. blocking_issues = [] if none. Ensure the file is valid
  JSON. After writing it, stop — do nothing else.
