[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ale-task-eval-deps"
version = "0.1.0"
description = "Auto-generated eval dependencies for published tasks."
requires-python = ">=3.12,<3.14"
dependencies = [
    "rasterio>=1.4.0",
    "netCDF4>=1.7.0",
    "PyMuPDF>=1.27.2.3",
    "PyYAML>=6.0.3",
    "aiohttp>=3.13.5",
    "h5py>=3.16.0",
    "librosa>=0.11.0",
    "ltspice>=1.0.6",
    "lxml>=6.1.0",
    "matplotlib>=3.10.9",
    "numpy>=2.4.4",
    "openai>=2.8.0",
    "opencv-python-headless>=4.13.0.92",
    "openpyxl>=3.1.5",
    "pandas>=2.3.3",
    "pillow>=12.2.0",
    "posthog>=7.13.1",
    "pretty_midi>=0.2.11",
    "pydicom>=2.4.0",
    "pymedphys>=0.39.0",
    "python-dotenv>=1.2.2",
    "requests>=2.33.1",
    "safetensors>=0.7.0",
    "scikit-image>=0.26.0",
    "scikit-learn>=1.8.0",
    "scipy>=1.17.1",
    "sgfmill>=1.1.1",
    "soundfile>=0.13.1",
    "tifffile>=2026.4.11",
    "torch>=2.11.0",
]

[tool.hatch.build.targets.wheel]
only-include = []
sources = {}
bypass-selection = true
