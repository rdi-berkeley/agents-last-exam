# =============================================================================
# example_exp.yaml — minimal experiment entry. Copy + edit + run:
#
#     uv run python -m ale_run run example_exp.yaml
#     uv run python -m ale_run run example_exp.yaml --dry-run
#
# An experiment only wires things together. All agent configuration lives in a
# file under `configs/agents/`; all environment configuration lives in a file
# under `configs/environments/`. The experiment references them by path and
# carries only run-level knobs (output / artifacts_path / concurrency / ...).
#
#   agents:       one or more paths under configs/agents/. List several to run
#                 the agent matrix (every agent over every task).
#   environment:  exactly one path under configs/environments/.
#
# Secrets & env vars: copy `secret/.env.example` → `secret/.env` and fill in.
# The loader reads `secret_file` (relative to this yaml) before parsing, so any
# $-env reference (UPPER_SNAKE form) in a referenced config resolves without a
# manual `export`. Shell env still wins, so `export FOO=bar` overrides for a
# one-off run.
# =============================================================================

name: my_experiment

secret_file: secret/.env                          # KEY=value pairs

agents:
  - configs/agents/cc_sonnet_or_t3.yaml           # add more lines to run a matrix
environment: configs/environments/gcloud_ubuntu.yaml

tasks: selected_tasks/helloworld.txt

# ---- run-level knobs (all optional; defaults shown) ----
# NB: task_data_source + output_path are NOT here — they are substrate-coupled
# and live in the environment yaml (configs/environments/<env>.yaml), next to
# the code that consumes them (task_data/ + output_pull.py).
output:
  root: .logs/ale                                 # host-side run-log dir
concurrency: 1                                    # units in flight (caps VMs + LLM RPM)
cleanup_mode: delete                              # delete | stop | keep

# Appended verbatim (as its own paragraph) to EVERY task's prompt before it
# reaches the agent. Empty/unset ⇒ no change. Use a `|` block for multi-line.
prompt_suffix: |
  Complete the task fully autonomously. You have no opportunity to interact with the user; the user will directly evaluate the output you produce.
  Do not get stuck in a failure loop — if you conclude the task genuinely cannot be completed (for example, the input data is incomplete, the task itself is unreasonable, or the environment has an anomaly you cannot resolve), write an `infeasible.md` to the output directory explaining the specific reason in detail.
