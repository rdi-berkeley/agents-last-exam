# =============================================================================
# example_exp.yaml — minimal experiment entry. Copy + edit + run:
#
#     uv run python -m ale_run run example_exp.yaml
#     uv run python -m ale_run run example_exp.yaml --dry-run
#
# Only the four blocks below are required (name / agent / environment / tasks).
# Long-tail knobs live in `configs/` and are pulled in via `profile:` paths.
# Any field set directly here overrides the profile.
#
# Secrets & env vars: copy `secret/.env.example` → `secret/.env` and fill in.
# The loader reads `secret_file` (relative to this yaml) before parsing, so any
# $-env reference (UPPER_SNAKE form) below resolves without manual `export`.
# Shell env still wins, so `export FOO=bar` overrides the file for one-off runs.
# =============================================================================

name: my_experiment

secret_file: secret/.env                          # KEY=value pairs;

agent:
  harness: claude_code                            # claude_code | ale_claw
  model: anthropic/claude-sonnet-4-6              # OpenRouter slug
  profile: configs/agents/cc_sonnet.yaml          # max_turns / timeout / ... (optional)

environment:
  provider: gcloud                                   # gcloud | static
  profile: configs/environments/gcloud_default.yaml  # project / SA key / zone / images / ...

tasks: selected_tasks/helloworld.txt

run_profile: configs/runs/default.yaml            # Default run-level profile (output dir, concurrency, artifacts).

# Appended verbatim (as its own paragraph) to EVERY task's prompt before it
# reaches the agent. Empty/unset ⇒ no change. Use a `|` block for multi-line.
prompt_suffix: |
  Complete the task fully autonomously. You have no opportunity to interact with the user; the user will directly evaluate the output you produce.
  Do not get stuck in a failure loop — if you conclude the task genuinely cannot be completed (for example, the input data is incomplete, the task itself is unreasonable, or the environment has an anomaly you cannot resolve), write an `infeasible.md` to the output directory explaining the specific reason in detail.
