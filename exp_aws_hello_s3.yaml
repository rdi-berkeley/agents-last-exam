# AWS demo: demo/hello (Linux) with Claude Code + Sonnet, mirroring example_exp.yaml.
name: aws_hello_s3

secret_file: secret/.env

agents:
  - configs/agents/claude_code.yaml          # model: anthropic/claude-sonnet-4.6 (openrouter)
