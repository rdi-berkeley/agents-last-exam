# Smoke: grok_cli with Docker provider, OpenRouter routing.
# Run:
#   uv run python -m ale_run run experiments/smoke_grok_docker.yaml
name: smoke_grok_docker

secret_file: ../secret/.env

agent:
  harness: grok_cli
  model: x-ai/grok-4.1-fast
  config:
    timeout_s: 180
    max_turns: 3
    max_tool_rounds: 400

environment:
  provider: docker
  image: agentslastexam/ale-kasm:latest

tasks:
  - path: demo/hello
    variants: [0]

artifacts_path:
  task_data_source: baked_in_sandbox
  output_path: local

output:
  root: .logs/smoke

concurrency: 1
cleanup_mode: delete
